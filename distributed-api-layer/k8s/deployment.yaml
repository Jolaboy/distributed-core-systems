apiVersion: apps/v1
kind: Deployment
metadata:
  name: distributed-api-layer
  labels:
    app: distributed-api-layer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: distributed-api-layer
  template:
    metadata:
      labels:
        app: distributed-api-layer
    spec:
      containers:
        - name: api-layer
          image: jolaboy/distributed-api-layer:latest
          ports:
            - containerPort: 8080
          env:
            - name: BIND_ADDR
              value: "0.0.0.0:8080"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: "100m"
              memory: "32Mi"
            limits:
              cpu: "500m"
              # Enforce the <45MB operational ceiling at the orchestrator level.
              memory: "45Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: distributed-api-layer
  labels:
    app: distributed-api-layer
spec:
  type: ClusterIP
  selector:
    app: distributed-api-layer
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
