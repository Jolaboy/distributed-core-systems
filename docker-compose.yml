# Full local stack: Rust API (REST + gRPC), Redis cache tier, Kafka event bus,
# and the Node.js downstream consumer.
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  rust-api:
    build:
      context: ./distributed-api-layer
    ports:
      - "8080:8080"   # REST
      - "50051:50051" # gRPC
    environment:
      BIND_ADDR: 0.0.0.0:8080
      GRPC_ADDR: 0.0.0.0:50051
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: telemetry.frames
      RUST_LOG: info
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  node-consumer:
    build:
      context: ./services/node-consumer
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: telemetry.frames
      KAFKA_GROUP: node-consumer
      GRPC_ADDR: rust-api:50051
    depends_on:
      kafka:
        condition: service_started
      rust-api:
        condition: service_started
